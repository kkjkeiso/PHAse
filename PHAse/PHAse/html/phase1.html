<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHAse | PHAse1</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="top-bar">
    <a href="./index.html" class="logo">PH<span>A</span>se</a>
    <div class="top-bar-actions" id="top-actions"></div>
  </div>

  <div class="page-content">

    <div id="not-logged-message" style="display:none; text-align:center; padding:80px 0;">
      <p style="color:var(--text-muted); font-weight:600; margin-bottom:24px;">Faça login para acessar o conteúdo.</p>
      <div style="display:flex; gap:12px; justify-content:center;">
        <a href="./login.html" class="btn btn-login">Login</a>
        <a href="./register.html" class="btn btn-register">Cadastrar-se</a>
      </div>
    </div>

    <div id="phase1-content" style="display:none;">
      <div style="display:flex; flex-direction:column; gap:24px;">

        <div class="hero-card">
          <span style="font-family:'Space Grotesk',sans-serif; font-size:1.4rem; font-weight:700;">PHAse1</span>
          <p class="hero-sub">Bem-vindo à PHAse1! Aqui você encontrará dicas e informações sobre educação financeira, controle de gastos, investimentos e planejamento financeiro para estudantes.</p>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
          <div class="card" style="display:flex; flex-direction:column; gap:12px;">
            <span style="font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted);">Vídeo 1</span>
            <iframe style="width:100%; aspect-ratio:16/9; border-radius:10px; border:none;"
              src="https://www.youtube.com/embed/3DdR5LchPug"
              title="PHAse1 Video 1" allowfullscreen></iframe>
          </div>
          <div class="card" style="display:flex; flex-direction:column; gap:12px;">
            <span style="font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted);">Vídeo 2</span>
            <iframe style="width:100%; aspect-ratio:16/9; border-radius:10px; border:none;"
              src="https://www.youtube.com/embed/5QgH8Y6n0nM"
              title="PHAse1 Video 2" allowfullscreen></iframe>
          </div>
        </div>

      </div>
    </div>

  </div>

  <script src="../js/nav.js"></script>
  <script src="../js/menu.js"></script>
  <script>
    const usuarioLogado = localStorage.getItem('usuarioLogado');
    const topActions = document.getElementById('top-actions');

    if (usuarioLogado) {
      document.getElementById('phase1-content').style.display = 'block';
      document.getElementById('not-logged-message').style.display = 'none';
      topActions.innerHTML = `
        <span style="font-size:0.85rem; color:var(--text-muted); font-weight:600;">Olá, ${usuarioLogado}</span>
        <button class="btn btn-logout" id="logout-btn">Sair</button>
      `;
      document.getElementById('logout-btn').addEventListener('click', () => {
        localStorage.removeItem('usuarioLogado');
        localStorage.removeItem('token');
        window.location.href = './index.html';
      });
    } else {
      document.getElementById('phase1-content').style.display = 'none';
      document.getElementById('not-logged-message').style.display = 'block';
    }
  </script>
</body>
</html>
