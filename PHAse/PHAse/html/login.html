<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHAse | Login</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="top-bar">
    <a href="./index.html" class="logo">PH<span>A</span>se</a>
  </div>

  <div class="page-content form-page">
    <div class="form-box">
      <h2>Faça seu login</h2>

      <form id="login-step1">
        <div style="display:flex; flex-direction:column; gap:12px;">
          <input id="username" type="text" placeholder="Usuário ou Email" required>
          <button type="submit" class="btn btn-register">Próximo</button>
        </div>
      </form>

      <form id="login-step2" style="display:none;">
        <div style="display:flex; flex-direction:column; gap:12px;">
          <input id="password" type="password" placeholder="Senha" required>
          <button type="submit" class="btn btn-register">Entrar</button>
        </div>
      </form>

      <p class="form-footer">Novo aqui? <a href="./register.html">Cadastrar-se</a></p>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script src="../js/menu.js"></script>
</body>
</html>
