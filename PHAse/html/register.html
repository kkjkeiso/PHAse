<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PHAse | Register</title>
<link rel="stylesheet" href="../css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
</head>
<body class="register-page">
<a href="index.html" class="back-button"><span>←</span> Voltar</a>
<h1 class="page-title">PHAse</h1>

<main class="center">
  <h2 class="form-title">Crie sua conta</h2>

  <form class="card" id="register-step1">
    <input id="reg-username" placeholder="Nome de usuário ou Email" required>
    <button type="submit">Próximo</button>
  </form>

  <form class="card" id="register-step2" style="display:none;">
    <input id="reg-password" type="password" placeholder="Senha" required>
    <input id="reg-password2" type="password" placeholder="Confirme a senha" required>
    <button type="submit">Cadastrar</button>
  </form>

  <p class="small">Já possui uma conta? <a href="login.html" class="link-blue">Login</a></p>
</main>

<script src="../js/register.js"></script>
</body>
</html>
