<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHAse | Scoreboard</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="top-bar">
    <a href="./index.html" class="logo">PH<span>A</span>se</a>
    <div class="top-bar-actions" id="top-actions"></div>
  </div>

  <div class="page-content">
    <div style="display:flex; flex-direction:column; gap:24px;">

      <div class="hero-card">
        <span style="font-family:'Space Grotesk',sans-serif; font-size:1.4rem; font-weight:700;">Scoreboard</span>
        <p class="hero-sub">Acompanhe o ranking geral e o seu progresso individual em cada PHAse.</p>
      </div>

      <div style="display:grid; grid-template-columns:2fr 1fr; gap:20px;">

        <!-- Ranking geral -->
        <div class="card">
          <p style="font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:20px;">Ranking Geral</p>
          <table class="scoreboard-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Aluno</th>
                <th>PHAses</th>
                <th>Pontuação</th>
              </tr>
            </thead>
            <tbody id="ranking-body">
              <tr>
                <td colspan="4" style="color:var(--text-muted); text-align:center; padding:32px 0;">
                  Nenhum dado disponível ainda.
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Progresso individual -->
        <div class="card" style="display:flex; flex-direction:column; gap:20px;">
          <p style="font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted);">Seu Progresso</p>

          <div id="progress-logged-out" style="display:none; text-align:center; padding:32px 0;">
            <p style="color:var(--text-muted); font-size:0.875rem; margin-bottom:16px;">Faça login para ver seu progresso.</p>
            <a href="./login.html" class="btn btn-register" style="display:inline-block;">Login</a>
          </div>

          <div id="progress-content" style="display:none; flex-direction:column; gap:16px;">
            <p style="font-weight:700;" id="progress-username"></p>

            <div style="display:flex; flex-direction:column; gap:10px;">
              <div style="display:flex; justify-content:space-between; font-size:0.85rem;">
                <span style="color:var(--text-muted);">PHAse 1</span>
                <span id="phase1-status" style="color:var(--accent); font-weight:700;">—</span>
              </div>
              <div style="display:flex; justify-content:space-between; font-size:0.85rem;">
                <span style="color:var(--text-muted);">PHAse 2</span>
                <span style="color:var(--text-muted); font-weight:700;">Indisponível</span>
              </div>
              <div style="display:flex; justify-content:space-between; font-size:0.85rem;">
                <span style="color:var(--text-muted);">PHAse 3</span>
                <span style="color:var(--text-muted); font-weight:700;">Indisponível</span>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script src="../js/menu.js"></script>
  <script>
    const usuarioLogado = localStorage.getItem('usuarioLogado');
    const topActions = document.getElementById('top-actions');

    if (usuarioLogado) {
      topActions.innerHTML = `
        <span style="font-size:0.85rem; color:var(--text-muted); font-weight:600;">Olá, ${usuarioLogado}</span>
        <button class="btn btn-logout" id="logout-btn">Sair</button>
      `;
      document.getElementById('logout-btn').addEventListener('click', () => {
        localStorage.removeItem('usuarioLogado');
        localStorage.removeItem('token');
        window.location.href = './index.html';
      });

      document.getElementById('progress-logged-out').style.display = 'none';
      const progressContent = document.getElementById('progress-content');
      progressContent.style.display = 'flex';
      document.getElementById('progress-username').textContent = usuarioLogado;
    } else {
      document.getElementById('progress-logged-out').style.display = 'block';
      document.getElementById('progress-content').style.display = 'none';
    }
  </script>
</body>
</html>
