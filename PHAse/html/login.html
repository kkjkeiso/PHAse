<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHAse | Login</title>
<link rel="stylesheet" href="../css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
<a href="index.html" class="back-button"><span>←</span> Voltar</a>
<h1 class="page-title">PHAse</h1>

<main class="center">
  <h2 class="form-title">Faça seu login</h2>

  <form class="card" id="login-step1">
    <input id="username" type="text" placeholder="Usuário ou Email" required>
    <button type="submit">Próximo</button>
  </form>

  <form class="card" id="login-step2" style="display:none;">
    <input id="password" type="password" placeholder="Senha" required>
    <button type="submit">Entrar</button>
  </form>

  <p class="small">Novo aqui? <a href="register.html" class="link-blue">Cadastrar-se</a></p>
</main>

<script src="../js/login.js"></script>
</body>
</html>
