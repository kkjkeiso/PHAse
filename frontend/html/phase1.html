<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHAse 1</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ── Estilos específicos da página de conteúdo ── */

    /* Cabeçalho da matéria */
    .subject-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .subject-header-left { display: flex; flex-direction: column; gap: 8px; }

    .subject-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      background: rgba(124,109,250,0.1);
      border: 1px solid rgba(124,109,250,0.22);
      padding: 4px 12px;
      border-radius: 999px;
    }

    .subject-main-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      font-weight: 700;
    }

    /* Seletor de tópicos (pills horizontais) */
    .topic-scroller {
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .topic-scroller::-webkit-scrollbar { height: 3px; }
    .topic-scroller::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }

    /* Cards de interação (dúvidas + questionário) */
    .interaction-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .interaction-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .interaction-card.ai-card   { border-color: rgba(124,109,250,0.25); background: rgba(124,109,250,0.04); }
    .interaction-card.quiz-card { border-color: rgba(61,220,132,0.2);   background: rgba(61,220,132,0.03); }

    .interaction-card-title {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .interaction-card.ai-card   .interaction-card-title { color: var(--accent); }
    .interaction-card.quiz-card .interaction-card-title { color: var(--success); }

    .interaction-card p {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* AI response area */
    .ai-response-area {
      display: none;
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.7;
      background: rgba(124,109,250,0.06);
      border: 1px solid rgba(124,109,250,0.14);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      animation: fadeIn 0.3s ease both;
    }

    .ai-loading {
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .ai-loading i { animation: pulse 1s ease-in-out infinite; color: var(--accent); }

    /* Section labels */
    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* Videos grid */
    .videos-grid { display: flex; flex-direction: column; gap: 10px; }

    /* Topic não selecionado */
    .no-topic {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 60px 0;
      text-align: center;
      color: var(--text-muted);
    }

    .no-topic i { font-size: 2.5rem; opacity: 0.3; }
    .no-topic p { font-size: 0.9rem; }

    /* Conteúdo animado */
    .content-animate { animation: fadeUp 0.4s ease both; }

    /* Score badge */
    .phase-score-badge {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent);
      background: rgba(124,109,250,0.1);
      border: 1px solid rgba(124,109,250,0.2);
      padding: 4px 12px;
      border-radius: 999px;
    }

    @media (max-width: 768px) {
      .interaction-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!--
    phase1.html — Página de conteúdo do PHAse 1 (ENEM)

    Fluxo:
    1. Lê ?s= da URL para saber qual matéria exibir
    2. Faz fetch de /data/{materia}.json para carregar os tópicos
    3. Exibe hero com tópicos selecionáveis (pills)
    4. Ao selecionar tópico: exibe vídeos, conteúdo e caixas de interação
    5. Caixa esquerda: tirar dúvidas com a SAGE AI (via API Anthropic)
    6. Caixa direita: iniciar questionário gerado pela IA
  -->

  <div class="page-content" id="page-root">
    <!-- Conteúdo injetado via JS -->
    <div style="display:flex; align-items:center; justify-content:center; min-height:50vh;">
      <span style="color:var(--text-muted);">Carregando...</span>
    </div>
  </div>

  <script src="../../js/nav.js"></script>
  <script>
  // ============================================================
  // Configuração das matérias disponíveis no Phase 1
  // ============================================================
  const MATERIAS = {
    portugues:      { label: 'Português',       icon: 'fa-book',                  dataFile: 'portugues' },
    redacao:        { label: 'Redação',          icon: 'fa-pen-nib',               dataFile: null },
    literatura:     { label: 'Literatura',       icon: 'fa-feather',               dataFile: null },
    ingles:         { label: 'Inglês',           icon: 'fa-language',              dataFile: null },
    espanhol:       { label: 'Espanhol',         icon: 'fa-earth-americas',        dataFile: null },
    artes:          { label: 'Artes',            icon: 'fa-palette',               dataFile: null },
    educacaofisica: { label: 'Educação Física',  icon: 'fa-person-running',        dataFile: null },
    matematica:     { label: 'Matemática',       icon: 'fa-square-root-variable',  dataFile: null },
    biologia:       { label: 'Biologia',         icon: 'fa-leaf',                  dataFile: null },
    quimica:        { label: 'Química',          icon: 'fa-flask',                 dataFile: null },
    fisica:         { label: 'Física',           icon: 'fa-atom',                  dataFile: null },
    historia:       { label: 'História',         icon: 'fa-landmark',              dataFile: null },
    geografia:      { label: 'Geografia',        icon: 'fa-map',                   dataFile: null },
    filosofia:      { label: 'Filosofia',        icon: 'fa-brain',                 dataFile: null },
    sociologia:     { label: 'Sociologia',       icon: 'fa-people-group',          dataFile: null },
  };

  // ============================================================
  // Estado global
  // ============================================================
  let SUBJECT_DATA   = null; // JSON carregado da matéria
  let ACTIVE_TOPIC   = null; // Tópico atual selecionado
  let SUBJECT_KEY    = '';   // Chave da matéria (?s=)

  // ============================================================
  // Inicialização
  // ============================================================
  (async function init() {
    const params = new URLSearchParams(window.location.search);
    SUBJECT_KEY  = params.get('s') || '';

    if (!MATERIAS[SUBJECT_KEY]) {
      window.location.href = '../phases.html';
      return;
    }

    const info = MATERIAS[SUBJECT_KEY];
    document.title = 'PHAse | ' + info.label;

    // Se a matéria tem arquivo JSON, faz o fetch
    if (info.dataFile) {
      try {
        // Path relativo: phases/ → ../../data/
        const res  = await fetch('../../data/' + info.dataFile + '.json');
        if (!res.ok) throw new Error('not found');
        SUBJECT_DATA = await res.json();
      } catch (e) {
        console.warn('JSON não encontrado para', info.dataFile, '— usando placeholder.');
      }
    }

    renderPage(info);
  })();

  // ============================================================
  // Renderiza a página completa
  // ============================================================
  function renderPage(info) {
    const root = document.getElementById('page-root');

    root.innerHTML = `
      <div class="phase-stack-page">

        <!-- Breadcrumb -->
        <nav class="phase-breadcrumb">
          <a href="../../html/phases.html">PHAses</a>
          <i class="fa-solid fa-chevron-right"></i>
          <a href="../../html/phases.html">PHAse 1 — ENEM</a>
          <i class="fa-solid fa-chevron-right"></i>
          <span style="color:var(--text);">${info.label}</span>
        </nav>

        <!-- Hero da matéria -->
        <div class="hero-card">
          <div class="subject-header">
            <div class="subject-header-left">
              <span class="subject-badge">
                <i class="fa-solid ${info.icon}"></i> PHAse 1 — ENEM
              </span>
              <h1 class="subject-main-title">${info.label}</h1>
              ${SUBJECT_DATA ? `<p class="hero-sub" style="max-width:520px;">${SUBJECT_DATA.description || ''}</p>` : `<p class="hero-sub" style="max-width:520px;">Conteúdo em desenvolvimento. Em breve disponível!</p>`}
            </div>
            <span class="phase-score-badge" id="score-badge">
              <i class="fa-solid fa-star"></i>
              <span id="score-val">${localStorage.getItem('phase1_points') || '0'}</span> pts
            </span>
          </div>

          <!-- Pills de tópicos -->
          ${SUBJECT_DATA && SUBJECT_DATA.topics ? `
            <div class="topic-scroller" style="margin-top:24px;">
              <div class="subject-nav">
                ${SUBJECT_DATA.topics.map((t, i) => `
                  <button class="subject-pill ${i === 0 ? 'active' : ''}"
                          onclick="selectTopic('${t.id}')"
                          data-topic="${t.id}">
                    ${t.name}
                  </button>
                `).join('')}
              </div>
            </div>
          ` : ''}
        </div>

        <!-- Área de conteúdo -->
        <div id="content-area">
          ${SUBJECT_DATA && SUBJECT_DATA.topics && SUBJECT_DATA.topics.length > 0
            ? '' // preenchido por selectTopic()
            : renderNoContent()
          }
        </div>

      </div>
    `;

    // Seleciona primeiro tópico automaticamente se houver
    if (SUBJECT_DATA && SUBJECT_DATA.topics && SUBJECT_DATA.topics.length > 0) {
      selectTopic(SUBJECT_DATA.topics[0].id);
    }
  }

  // ============================================================
  // Seleciona um tópico e renderiza seu conteúdo
  // ============================================================
  function selectTopic(topicId) {
    if (!SUBJECT_DATA) return;

    const topic = SUBJECT_DATA.topics.find(t => t.id === topicId);
    if (!topic) return;

    ACTIVE_TOPIC = topic;

    // Atualiza pills ativas
    document.querySelectorAll('.subject-pill').forEach(pill => {
      pill.classList.toggle('active', pill.dataset.topic === topicId);
    });

    // Renderiza conteúdo
    const area = document.getElementById('content-area');
    area.innerHTML = renderTopicContent(topic);
  }

  // ============================================================
  // Renderiza o conteúdo de um tópico
  // ============================================================
  function renderTopicContent(topic) {
    return `
      <div class="content-animate" style="display:flex; flex-direction:column; gap:24px;">

        <!-- Vídeos recomendados -->
        <div class="card">
          <p class="section-label"><i class="fa-brands fa-youtube" style="color:#ff4444;"></i> Videoaulas recomendadas</p>
          <div class="videos-grid">
            ${topic.videos.map(v => `
              <a href="${v.url}" target="_blank" rel="noopener" class="video-card">
                <div class="video-icon"><i class="fa-brands fa-youtube"></i></div>
                <div class="video-info">
                  <span class="video-title">${v.title}</span>
                  <span class="video-channel">${v.channel}</span>
                </div>
                <i class="fa-solid fa-arrow-up-right-from-square video-ext-icon"></i>
              </a>
            `).join('')}
          </div>
        </div>

        <!-- Conteúdo textual verificado -->
        <div class="card">
          <div class="content-header" style="margin-bottom:20px;">
            <p class="section-label" style="margin-bottom:0;">
              <i class="fa-solid fa-file-lines"></i> Conteúdo verificado
            </p>
            <span class="sources-badge">
              <i class="fa-solid fa-shield-check"></i>
              ${topic.sources ? topic.sources.length + ' fontes' : 'Curado'}
            </span>
          </div>

          <div class="phase-text-content">
            ${topic.content}
          </div>

          ${topic.sources ? `
            <div class="phase-bibliography">
              <p class="bib-header"><i class="fa-solid fa-book-bookmark"></i> Referências</p>
              ${topic.sources.map(s => `<p>• ${s}</p>`).join('')}
            </div>
          ` : ''}
        </div>

        <!-- Caixas de interação: IA + Questionário -->
        <div class="interaction-grid">

          <!-- Esquerda: Tirar dúvidas com a IA -->
          <div class="interaction-card ai-card">
            <p class="interaction-card-title">
              <i class="fa-solid fa-robot"></i> Tirar dúvida com a SAGE AI
            </p>
            <p>Tem alguma dúvida sobre <strong style="color:var(--text);">${topic.name}</strong>? Pergunte à SAGE e receba uma explicação contextualizada.</p>

            <textarea class="phase-textarea phase-textarea--sm"
                      id="ai-question-input"
                      placeholder="Ex: Qual a diferença entre adjetivo e advérbio?"></textarea>

            <div class="ai-loading" id="ai-loading">
              <i class="fa-solid fa-circle-notch fa-spin"></i>
              <span>SAGE AI pensando...</span>
            </div>

            <div class="ai-response-area" id="ai-response"></div>

            <button class="btn btn-register" onclick="askSageAI()" style="align-self:flex-start;">
              <i class="fa-solid fa-paper-plane"></i> Perguntar
            </button>
          </div>

          <!-- Direita: Iniciar questionário -->
          <div class="interaction-card quiz-card">
            <p class="interaction-card-title">
              <i class="fa-solid fa-clipboard-question"></i> Questionário
            </p>
            <p>Teste seus conhecimentos sobre <strong style="color:var(--text);">${topic.name}</strong> com questões geradas pela SAGE AI baseadas no conteúdo acima.</p>
            <div style="display:flex; gap:8px; flex-wrap:wrap; font-size:0.8rem; color:var(--text-muted);">
              <span><i class="fa-solid fa-circle-question"></i> 5 questões</span>
              <span><i class="fa-solid fa-star"></i> +10 pts por acerto</span>
              <span><i class="fa-solid fa-trophy"></i> +50 pts ao completar</span>
            </div>

            <div id="quiz-area">
              <button class="btn btn-register" onclick="startQuiz()" style="background:var(--success); align-self:flex-start;">
                <i class="fa-solid fa-play"></i> Iniciar questionário
              </button>
            </div>
          </div>

        </div>
      </div>
    `;
  }

  // ============================================================
  // Estado quando não há conteúdo disponível
  // ============================================================
  function renderNoContent() {
    return `
      <div class="card">
        <div class="no-topic">
          <i class="fa-solid fa-book-open-reader"></i>
          <p>Conteúdo para esta matéria está sendo desenvolvido.</p>
          <p style="font-size:0.8rem;">Em breve estará disponível com tópicos, videoaulas e a SAGE AI.</p>
          <a href="../../html/phases.html" class="btn btn-login" style="margin-top:8px;">
            <i class="fa-solid fa-arrow-left"></i> Voltar às PHAses
          </a>
        </div>
      </div>
    `;
  }

  // ============================================================
  // SAGE AI — Tirar dúvidas (usa Anthropic API via fetch)
  // ============================================================
  async function askSageAI() {
    const input    = document.getElementById('ai-question-input');
    const response = document.getElementById('ai-response');
    const loading  = document.getElementById('ai-loading');
    const question = input ? input.value.trim() : '';

    if (!question) {
      alert('Digite sua dúvida antes de enviar.');
      return;
    }

    if (!ACTIVE_TOPIC) return;

    // Mostra loading
    loading.style.display  = 'flex';
    response.style.display = 'none';

    // Contexto: conteúdo da matéria atual (stripped de HTML)
    const contextText = ACTIVE_TOPIC.content.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ');

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: `Você é a SAGE AI, assistente de estudos do PHAse — uma plataforma educacional brasileira para o ENEM. 
Responda APENAS com base no conteúdo fornecido abaixo. Seja claro, didático e use linguagem acessível para estudantes do ensino médio.
Não invente informações além do que está no contexto. Se a pergunta não estiver relacionada ao conteúdo, diga que só pode ajudar com o tema ${ACTIVE_TOPIC.name}.

CONTEÚDO DE REFERÊNCIA:
${contextText}`,
          messages: [
            { role: 'user', content: question }
          ]
        })
      });

      if (!res.ok) throw new Error('API error');

      const data = await res.json();
      const text = data.content.map(c => c.text || '').join('\n').trim();

      response.textContent  = text;
      response.style.display = 'block';
    } catch (err) {
      response.textContent   = 'Erro ao conectar com a SAGE AI. Tente novamente em instantes.';
      response.style.display = 'block';
    } finally {
      loading.style.display = 'none';
    }
  }

  // ============================================================
  // Questionário gerado pela SAGE AI
  // ============================================================
  async function startQuiz() {
    const quizArea = document.getElementById('quiz-area');
    if (!ACTIVE_TOPIC) return;

    quizArea.innerHTML = `
      <div class="ai-loading" style="display:flex;">
        <i class="fa-solid fa-circle-notch fa-spin" style="color:var(--success);"></i>
        <span>Gerando questionário com a SAGE AI...</span>
      </div>
    `;

    const contextText = ACTIVE_TOPIC.content.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ');

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: `Você é a SAGE AI gerando um questionário para o ENEM sobre "${ACTIVE_TOPIC.name}".
Responda APENAS com um JSON válido no formato abaixo. NÃO inclua \`\`\`json ou qualquer outro texto.
{
  "questions": [
    {
      "question": "Pergunta aqui?",
      "options": ["A) opção", "B) opção", "C) opção", "D) opção"],
      "answer": 0,
      "explanation": "Explicação breve da resposta correta."
    }
  ]
}
- Gere exatamente 5 questões de múltipla escolha (A a D).
- Baseie-se SOMENTE no conteúdo fornecido.
- "answer" é o índice (0-3) da alternativa correta.
- Nível: vestibular/ENEM.

CONTEÚDO:
${contextText}`,
          messages: [{ role: 'user', content: 'Gere o questionário.' }]
        })
      });

      if (!res.ok) throw new Error('API error');

      const data = await res.json();
      const raw  = data.content.map(c => c.text || '').join('').trim();
      const cleaned = raw.replace(/```json|```/g, '').trim();
      const quiz = JSON.parse(cleaned);

      renderQuiz(quiz.questions, quizArea);
    } catch (err) {
      quizArea.innerHTML = `
        <p style="font-size:0.85rem; color:var(--danger);">
          <i class="fa-solid fa-triangle-exclamation"></i>
          Erro ao gerar o questionário. Tente novamente.
        </p>
        <button class="btn btn-login" onclick="startQuiz()" style="margin-top:8px;">
          <i class="fa-solid fa-rotate-right"></i> Tentar novamente
        </button>
      `;
    }
  }

  // ============================================================
  // Renderiza as questões do quiz
  // ============================================================
  function renderQuiz(questions, container) {
    let score      = 0;
    let answered   = 0;
    const total    = questions.length;

    container.innerHTML = `
      <div class="phase-questions" id="questions-list"></div>
      <div id="quiz-result" style="display:none; margin-top:16px;"></div>
    `;

    const list = container.querySelector('#questions-list');

    questions.forEach((q, qi) => {
      const qEl = document.createElement('div');
      qEl.innerHTML = `
        <p class="question-text">${qi + 1}. ${q.question}</p>
        ${q.options.map((opt, oi) => `
          <button class="option-btn" data-q="${qi}" data-o="${oi}" onclick="pickOption(this, ${qi}, ${oi}, ${q.answer})">
            ${opt}
          </button>
        `).join('')}
        <div class="question-explanation" id="exp-${qi}" style="display:none;">${q.explanation}</div>
      `;
      list.appendChild(qEl);
    });

    // Armazena para usar no callback
    window._quizData  = { questions, score: 0, answered: 0, total };
  }

  // ============================================================
  // Responde uma alternativa do quiz
  // ============================================================
  window.pickOption = function(btn, qIndex, oIndex, correctIndex) {
    // Bloqueia re-resposta
    const allBtns = document.querySelectorAll(`[data-q="${qIndex}"]`);
    allBtns.forEach(b => b.disabled = true);

    if (oIndex === correctIndex) {
      btn.classList.add('correct');
      window._quizData.score++;
    } else {
      btn.classList.add('wrong');
      // Marca a correta em verde
      allBtns[correctIndex].classList.add('correct');
    }

    // Mostra explicação
    const exp = document.getElementById('exp-' + qIndex);
    if (exp) exp.style.display = 'block';

    window._quizData.answered++;

    // Se respondeu todas, mostra resultado
    if (window._quizData.answered === window._quizData.total) {
      setTimeout(showQuizResult, 500);
    }
  };

  // ============================================================
  // Mostra resultado final do quiz
  // ============================================================
  function showQuizResult() {
    const { score, total } = window._quizData;
    const pct     = Math.round((score / total) * 100);
    const pts     = score * 10 + (score === total ? 100 : 50);
    const emoji   = pct >= 80 ? '🎉' : pct >= 60 ? '👍' : '📚';
    const msg     = pct >= 80 ? 'Excelente!' : pct >= 60 ? 'Bom trabalho!' : 'Continue praticando!';

    // Salva pontos no localStorage
    const prevPts   = parseInt(localStorage.getItem('phase1_points')  || '0');
    const prevQuiz  = parseInt(localStorage.getItem('phase1_quizzes') || '0');
    localStorage.setItem('phase1_points',  prevPts + pts);
    localStorage.setItem('phase1_quizzes', prevQuiz + 1);

    // Atualiza badge de score na página
    const scoreVal = document.getElementById('score-val');
    if (scoreVal) scoreVal.textContent = prevPts + pts;

    const resultEl = document.getElementById('quiz-result');
    if (resultEl) {
      resultEl.style.display = 'block';
      resultEl.innerHTML = `
        <div class="result-box">
          <span class="result-emoji">${emoji}</span>
          <p class="result-msg">${msg}</p>
          <p class="result-sub">${score} de ${total} corretas</p>
          <div class="result-badges">
            <span class="badge badge--accent"><i class="fa-solid fa-star"></i> +${pts} pontos</span>
            <span class="badge badge--green">${pct}% de aproveitamento</span>
          </div>
          <button class="btn btn-login" onclick="startQuiz()" style="margin-top:12px;">
            <i class="fa-solid fa-rotate-right"></i> Novo questionário
          </button>
        </div>
      `;
    }
  }

  // Expõe globais necessários
  window.selectTopic = selectTopic;
  window.askSageAI   = askSageAI;
  window.startQuiz   = startQuiz;
  </script>
</body>
</html>
