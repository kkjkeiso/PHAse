<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHAse 1</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <script>
    // ============================================================
    // phase1.html — Ponto de entrada para as matérias do ENEM
    //
    // Lê o parâmetro ?s= da URL e define window.PHASE_CONFIG,
    // que será consumido pelo phase.js para montar a página.
    //
    // Exemplo de uso:
    //   phase1.html?s=biologia
    //   phase1.html?s=matematica
    //
    // Se o parâmetro for inválido ou ausente, redireciona para phases.html.
    // ============================================================

    const params = new URLSearchParams(window.location.search);
    const s      = params.get('s') || '';

    // Mapa de matérias do ENEM — chave = parâmetro da URL
    const materias = {

      // Linguagens e Códigos
      portugues:      { subject: 'Português',       description: 'Falar bem é só o começo!' },
      redacao:        { subject: 'Redação',          description: 'Sua caneta pode mudar o mundo!' },
      literatura:     { subject: 'Literatura',       description: 'Histórias que atravessam séculos te aguardam!' },
      ingles:         { subject: 'Inglês',           description: 'O mundo inteiro te espera!' },
      espanhol:       { subject: 'Espanhol',         description: 'Otro idioma, otro mundo por descobrir!' },
      artes:          { subject: 'Artes',            description: 'Expressão que vai além das palavras!' },
      educacaofisica: { subject: 'Educação Física',  description: 'Corpo e mente em total sincronia!' },

      // Matemática e suas Tecnologias
      matematica:     { subject: 'Matemática',       description: 'Os números têm muito a te contar!' },

      // Ciências da Natureza
      biologia:       { subject: 'Biologia',         description: 'A vida em toda a sua complexidade te aguarda!' },
      quimica:        { subject: 'Química',          description: 'Tudo ao seu redor é química, descubra o porquê!' },
      fisica:         { subject: 'Física',           description: 'As leis que regem o universo te esperam!' },

      // Ciências Humanas
      historia:       { subject: 'História',         description: 'Entenda o passado, transforme o futuro!' },
      geografia:      { subject: 'Geografia',        description: 'O mundo é maior do que você imagina!' },
      filosofia:      { subject: 'Filosofia',        description: 'Questione tudo, entenda o mundo!' },
      sociologia:     { subject: 'Sociologia',       description: 'A sociedade começa com você!' }
    };

    // Redireciona se a matéria não existir, senão configura e atualiza o título
    if (!materias[s]) {
      window.location.href = '../phases.html';
    } else {
      window.PHASE_CONFIG = materias[s];
      document.title      = 'PHAse | ' + materias[s].subject;
    }
  </script>

  <!-- nav.js injeta a sidebar e a top bar automaticamente -->
  <script src="../../js/nav.js"></script>

  <!-- phase.js consome window.PHASE_CONFIG e monta toda a página -->
  <script src="../../js/phase.js"></script>

</body>
</html>
