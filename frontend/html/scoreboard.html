<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHAse | Scoreboard</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="page-content">
    <div class="scoreboard-stack">

      <div class="hero-card">
        <span class="scoreboard-title">Scoreboard</span>
        <p class="hero-sub">Acompanhe o ranking geral e o seu progresso individual em cada PHAse.</p>
      </div>

      <div class="scoreboard-grid">

        <div class="card">
          <p class="card-label" style="margin-bottom:24px;">Ranking Geral</p>
          <table class="scoreboard-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Aluno</th>
                <th>PHAses</th>
                <th>Pontuação</th>
              </tr>
            </thead>
            <tbody id="ranking-body">
              <tr>
                <td colspan="4" class="scoreboard-empty">Nenhum dado disponível ainda.</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="card scoreboard-progress">
          <p class="card-label">Seu Progresso</p>

          <div id="progress-logged-out" class="progress-loggedout">
            <i class="fa-solid fa-user-lock" style="font-size:2rem; color:var(--text-muted);"></i>
            <p class="hero-sub" style="font-size:0.9rem;">
              Faça login para ver seu progresso e aparecer no ranking.
            </p>
            <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
              <a href="./login.html"    class="btn btn-register">Entrar</a>
              <a href="./register.html" class="btn btn-login">Cadastrar</a>
            </div>
          </div>

          <div id="progress-content" class="progress-content" style="display:none;">
            <p class="progress-username" id="progress-username"></p>
            <div class="progress-phases">
              <div class="progress-row">
                <span class="hero-sub" style="font-size:0.875rem;">PHAse 1</span>
                <span id="phase1-status" class="progress-value">—</span>
              </div>
              <div class="progress-row">
                <span class="hero-sub" style="font-size:0.875rem;">PHAse 2</span>
                <span class="progress-value--locked">Indisponível</span>
              </div>
              <div class="progress-row">
                <span class="hero-sub" style="font-size:0.875rem;">PHAse 3</span>
                <span class="progress-value--locked">Indisponível</span>
              </div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const usuario   = localStorage.getItem('usuarioLogado');
    const loggedOut = document.getElementById('progress-logged-out');
    const content   = document.getElementById('progress-content');

    if (usuario) {
      loggedOut.style.display = 'none';
      content.style.display   = 'flex';
      document.getElementById('progress-username').textContent = usuario;

      const pts     = localStorage.getItem('phase1_points')  || '0';
      const quizzes = localStorage.getItem('phase1_quizzes') || '0';
      const statusEl = document.getElementById('phase1-status');

      if (parseInt(pts) > 0 || parseInt(quizzes) > 0) {
        statusEl.textContent = pts + ' pts · ' + quizzes + ' quiz(zes)';
      } else {
        statusEl.textContent  = 'Não iniciado';
        statusEl.style.color  = 'var(--text-muted)';
        statusEl.style.fontWeight = '600';
      }
    } else {
      loggedOut.style.display = 'flex';
      content.style.display   = 'none';
    }
  </script>

</body>
</html>
