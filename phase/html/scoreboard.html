<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHAse | Scoreboard</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- ============================================================
       SCOREBOARD
       Layout: ranking geral (2fr) + progresso individual (1fr)
       TODO: substituir localStorage por fetch('/api/scoreboard')
       ============================================================ -->
  <div class="page-content">
    <div class="scoreboard-stack">

      <!-- Hero -->
      <div class="hero-card">
        <span class="scoreboard-title">Scoreboard</span>
        <p class="hero-sub">Acompanhe o ranking geral e o seu progresso individual em cada PHAse.</p>
      </div>

      <div class="scoreboard-grid">

        <!-- Ranking geral — preenchido via API quando back-end estiver pronto -->
        <div class="card">
          <p class="card-label" style="margin-bottom:20px;">Ranking Geral</p>
          <table class="scoreboard-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Aluno</th>
                <th>PHAses</th>
                <th>Pontuação</th>
              </tr>
            </thead>
            <tbody id="ranking-body">
              <!-- Placeholder — substituído por dados reais via /api/scoreboard -->
              <tr>
                <td colspan="4" class="scoreboard-empty">Nenhum dado disponível ainda.</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Progresso individual -->
        <div class="card scoreboard-progress">
          <p class="card-label">Seu Progresso</p>

          <!-- Estado: não logado -->
          <div id="progress-logged-out" class="progress-loggedout">
            <p class="hero-sub">Faça login para ver seu progresso.</p>
            <a href="./login.html" class="btn btn-register">Login</a>
          </div>

          <!-- Estado: logado -->
          <div id="progress-content" class="progress-content">
            <p class="progress-username" id="progress-username"></p>
            <div class="progress-phases">
              <div class="progress-row">
                <span class="hero-sub">PHAse 1</span>
                <span id="phase1-status" class="progress-value">—</span>
              </div>
              <div class="progress-row">
                <span class="hero-sub">PHAse 2</span>
                <span class="progress-value progress-value--locked">Indisponível</span>
              </div>
              <div class="progress-row">
                <span class="hero-sub">PHAse 3</span>
                <span class="progress-value progress-value--locked">Indisponível</span>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- nav.js injeta a sidebar e a top bar dinamicamente -->
  <script src="../js/nav.js"></script>

  <!-- ============================================================
       Lógica de progresso individual
       Lê do localStorage enquanto o back-end não está pronto.
       Substituir por fetch('/api/scoreboard/me') quando o Java estiver pronto.
       ============================================================ -->
  <script>
    const usuario   = localStorage.getItem('usuarioLogado');
    const loggedOut = document.getElementById('progress-logged-out');
    const content   = document.getElementById('progress-content');

    if (usuario) {
      loggedOut.style.display = 'none';
      content.style.display   = 'flex';
      document.getElementById('progress-username').textContent = usuario;

      const pts     = localStorage.getItem('phase1_points')  || '0';
      const quizzes = localStorage.getItem('phase1_quizzes') || '0';
      document.getElementById('phase1-status').textContent = `${pts} pts · ${quizzes} quiz(zes)`;
    } else {
      loggedOut.style.display = 'block';
      content.style.display   = 'none';
    }
  </script>
</body>
</html>
