<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHAse | Cadastro</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- ============================================================
       FORMULÁRIO DE CADASTRO — duas etapas
       Etapa 1: usuário/email  →  Etapa 2: senha + confirmação
       TODO: adicionar register.js com chamada a /api/auth/register
       ============================================================ -->
  <div class="page-content form-page">
    <div class="form-box">
      <h2>Crie sua conta</h2>

      <!-- Etapa 1 — identificação do novo usuário -->
      <form id="register-step1">
        <div class="form-fields">
          <input id="reg-username" type="text" placeholder="Usuário ou Email" required>
          <button type="submit" class="btn btn-register">Próximo</button>
        </div>
      </form>

      <!-- Etapa 2 — senha (exibida após verificar disponibilidade via API) -->
      <form id="register-step2" style="display:none;">
        <div class="form-fields">
          <input id="reg-password"  type="password" placeholder="Senha" required>
          <input id="reg-password2" type="password" placeholder="Confirme a senha" required>
          <button type="submit" class="btn btn-register">Cadastrar</button>
        </div>
      </form>

      <p class="form-footer">Já possui uma conta? <a href="./login.html">Login</a></p>
    </div>
  </div>

  <!-- nav.js injeta a sidebar e a top bar dinamicamente -->
  <script src="../js/nav.js"></script>
</body>
</html>
