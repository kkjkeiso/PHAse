<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHAse | Login</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- ============================================================
       FORMULÁRIO DE LOGIN — duas etapas
       Etapa 1: usuário/email  →  Etapa 2: senha
       TODO: adicionar login.js com chamada a /api/auth/login
       ============================================================ -->
  <div class="page-content form-page">
    <div class="form-box">
      <h2>Faça seu login</h2>

      <!-- Etapa 1 — identificação do usuário -->
      <form id="login-step1">
        <div class="form-fields">
          <input id="username" type="text" placeholder="Usuário ou Email" required>
          <button type="submit" class="btn btn-register">Próximo</button>
        </div>
      </form>

      <!-- Etapa 2 — senha (exibida após validar o usuário via API) -->
      <form id="login-step2" style="display:none;">
        <div class="form-fields">
          <input id="password" type="password" placeholder="Senha" required>
          <button type="submit" class="btn btn-register">Entrar</button>
        </div>
      </form>

      <p class="form-footer">Novo aqui? <a href="./register.html">Cadastrar-se</a></p>
    </div>
  </div>

  <!-- nav.js injeta a sidebar e a top bar dinamicamente -->
  <script src="../js/nav.js"></script>
</body>
</html>
