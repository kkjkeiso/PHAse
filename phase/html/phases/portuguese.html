<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHAse | Português</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- NÃO LOGADO -->
  <div id="not-logged" style="display:none;">
    <div class="page-content" style="text-align:center;">
      <p style="font-size:1.1rem; color:var(--text-muted); font-weight:600; margin-bottom:24px;">
        Faça login para acessar o conteúdo.
      </p>
      <div style="display:flex; gap:12px; justify-content:center;">
        <a href="../login.html" class="btn btn-login">Login</a>
        <a href="../register.html" class="btn btn-register">Cadastrar-se</a>
      </div>
    </div>
  </div>

  <!-- LOGADO -->
  <div id="logged-content" style="display:none;">
    <div class="page-content">
      <div style="display:flex; flex-direction:column; gap:32px;">

        <!-- Hero -->
        <div class="hero-card">
          <span style="font-family:'Space Grotesk',sans-serif; font-size:2rem; font-weight:700;">Português</span>
          <p class="hero-sub">Explore gramática, interpretação, literatura e muito mais.</p>
          <div style="display:flex; gap:12px; margin-top:8px;">
            <input id="topic-input" type="text"
              placeholder="Que conteúdo gostaria de estudar hoje?"
              style="flex:1; padding:14px 18px; background:rgba(255,255,255,0.07); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-family:'Quicksand',sans-serif; font-size:0.95rem; outline:none;">
            <button id="search-btn" class="btn btn-register" style="padding:14px 24px; border-radius:var(--radius-sm);">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>
        </div>

        <!-- Conteúdo gerado -->
        <div id="content-area" style="display:none; flex-direction:column; gap:24px;">

          <!-- Vídeo aulas -->
          <div class="card">
            <p style="font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:16px;">
              <i class="fa-solid fa-play" style="margin-right:6px;"></i>Vídeo Aulas Recomendadas
            </p>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;" id="videos-area"></div>
          </div>

          <!-- Conteúdo textual -->
          <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
              <p style="font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted);">
                <i class="fa-solid fa-book-open" style="margin-right:6px;"></i>Conteúdo
              </p>
              <span style="font-size:0.7rem; color:var(--accent); font-weight:700; background:rgba(91,110,245,0.1); padding:4px 10px; border-radius:999px; border:1px solid rgba(91,110,245,0.2);">
                <i class="fa-solid fa-circle-check" style="margin-right:4px;"></i>Fontes verificadas
              </span>
            </div>
            <div id="text-content" style="font-size:0.9rem; line-height:1.8; color:var(--text-muted);"></div>
            <div id="bibliography" style="margin-top:20px; padding-top:16px; border-top:1px solid var(--border); font-size:0.78rem; color:var(--text-muted);"></div>
          </div>

          <!-- Dúvidas + Questionário -->
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">

            <div class="card" style="display:flex; flex-direction:column; gap:12px;">
              <p style="font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted);">
                <i class="fa-solid fa-circle-question" style="margin-right:6px;"></i>Tirar Dúvidas
              </p>
              <textarea id="doubt-input" placeholder="Digite sua dúvida sobre o conteúdo..."
                style="width:100%; min-height:100px; padding:12px 16px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-family:'Quicksand',sans-serif; font-size:0.875rem; outline:none; resize:vertical;"></textarea>
              <button class="btn btn-register" style="border-radius:var(--radius-sm);">
                <i class="fa-solid fa-paper-plane" style="margin-right:6px;"></i>Enviar
              </button>
              <div id="doubt-answer" style="display:none; font-size:0.875rem; color:var(--text-muted); line-height:1.6;"></div>
            </div>

            <div class="card" style="display:flex; flex-direction:column; gap:16px;">
              <p style="font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted);">
                <i class="fa-solid fa-graduation-cap" style="margin-right:6px;"></i>Questionário
              </p>
              <div style="display:flex; flex-direction:column; gap:8px;">
                <label style="font-size:0.8rem; color:var(--text-muted); font-weight:600;">Nível de dificuldade</label>
                <select id="difficulty-select"
                  style="padding:10px 14px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-family:'Quicksand',sans-serif; font-size:0.875rem; outline:none;">
                  <option value="easy">Fácil — Ensino Fundamental 1 (5 pts)</option>
                  <option value="medium">Médio — Ensino Fundamental 2 (10 pts)</option>
                  <option value="hard">Difícil — Ensino Médio (15 pts)</option>
                  <option value="vhard">Muito Difícil — Faculdade/Mestrado/Doutorado (20-25 pts)</option>
                </select>
              </div>
              <div style="display:flex; flex-direction:column; gap:8px;">
                <label style="font-size:0.8rem; color:var(--text-muted); font-weight:600;">Quantidade de questões</label>
                <input id="questions-count" type="number" min="1" max="20" value="5"
                  style="padding:10px 14px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-family:'Quicksand',sans-serif; font-size:0.875rem; outline:none;">
              </div>
              <button id="start-quiz-btn" class="btn btn-register" style="border-radius:var(--radius-sm); margin-top:auto;">
                <i class="fa-solid fa-play" style="margin-right:6px;"></i>Iniciar Questionário
              </button>
            </div>

          </div>

          <!-- Área do questionário -->
          <div id="quiz-area" style="display:none; flex-direction:column; gap:16px;">
            <div class="card">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <p style="font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted);">
                  <i class="fa-solid fa-list-check" style="margin-right:6px;"></i>Questões
                </p>
                <span id="score-display" style="font-size:0.85rem; font-weight:700; color:var(--accent);">0 pts</span>
              </div>
              <div id="questions-container" style="display:flex; flex-direction:column; gap:24px;"></div>
              <button id="submit-quiz-btn" class="btn btn-register" style="margin-top:24px; border-radius:var(--radius-sm); width:100%;">
                Finalizar e ver resultado
              </button>
            </div>

            <div id="quiz-result" style="display:none;">
              <div class="card" style="display:flex; flex-direction:column; gap:16px;">
                <p style="font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted);">Resultado</p>
                <div id="result-content"></div>
                <textarea id="feedback-input" placeholder="Como foi sua experiência com o conteúdo e as questões? Deixe seu feedback..."
                  style="width:100%; min-height:80px; padding:12px 16px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-family:'Quicksand',sans-serif; font-size:0.875rem; outline:none; resize:vertical;"></textarea>
                <button class="btn btn-register" style="border-radius:var(--radius-sm);">
                  <i class="fa-solid fa-paper-plane" style="margin-right:6px;"></i>Enviar Feedback
                </button>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="../../js/nav.js"></script>
  <script>
    const logado = localStorage.getItem('usuarioLogado');

    if (logado) {
      document.getElementById('logged-content').style.display = 'block';
      document.getElementById('not-logged').style.display = 'none';
    } else {
      document.getElementById('logged-content').style.display = 'none';
      document.getElementById('not-logged').style.display = 'block';
    }

    document.getElementById('search-btn').addEventListener('click', () => {
      const topic = document.getElementById('topic-input').value.trim();
      if (!topic) return;
      document.getElementById('content-area').style.display = 'flex';
    });

    document.getElementById('start-quiz-btn').addEventListener('click', () => {
      document.getElementById('quiz-area').style.display = 'flex';
    });
  </script>
</body>
</html>
